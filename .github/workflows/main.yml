name: Daily ETF Recovery Check

on:
  schedule:
    # UTC 12:00 = 뉴욕 오전 8:00 (서머타임 기준)
    - cron: '0 12 * * *'
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # v3에서 v4로 업데이트

      - name: Set up Python
        uses: actions/setup-python@v5 # v4에서 v5로 업데이트
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install yfinance pandas pytz requests

      - name: Run script
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python etf_low_tracker.py
